image: node:lts

include:
   - template: Code-Quality.gitlab-ci.yml

cache:
  key: node_modules
  paths:
    - node_modules/

before_script:
  - npm install --loglevel error 

lint:
  stage: test
  script:
    - npx web-ext lint -s src
    - npx jshint src
    - '! grep -r @todo src'

sign:
  stage: deploy
  script:
    # web-ext sign always fails (as documented), so manipulate the return code
    - 'npx web-ext sign -s src --channel=listed --api-url-prefix=https://addons.thunderbird.net/api/v3 || true'
  environment:
    name: production
    url: https://addons.thunderbird.net/de/thunderbird/addon/filelink-nextcloud-owncloud/
  only:
    # Only sign tagged releases
    - /^v\d+\.\d+\.\d+$/

pages:
  stage: deploy
  script:
  - node --experimental-fetch build-pages/build-pages.mjs
  artifacts:
    paths:
    - public
