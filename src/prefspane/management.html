<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8" />

  <title>*cloud</title>

  <link rel="stylesheet" href="chrome://global/skin/global.css" />
  <!-- <link rel="stylesheet" href="chrome://global/skin/popup.css" /> -->
  <link rel="stylesheet" href="chrome://messenger/skin/input-fields.css" />
  <!-- <link rel="stylesheet" href="chrome://messenger/skin/preferences/applications.css" /> -->
  <link rel="stylesheet" href="chrome://global/skin/in-content/common.css" />
  <link rel="stylesheet" href="chrome://messenger/skin/preferences/preferences.css" />

  <!-- <link rel="stylesheet" href="management.css"> -->
  <link rel="stylesheet" href="popup/popup.css">

  <script src="../lib/cloudconnection.js" defer></script>
  <script src="../lib/localize.js" defer></script>
  <script src="../lib/parsesemver.js" defer></script>
  <script src="popup/popup.js" defer></script>
  <script src="management.js" defer></script>

</head>

<body>
  <div id="header">
    <div id="header_left">
      <h2 id="provider_name">*cloud</h2>
      <div id="freespaceGauge">
        <label id="freespacelabel" data-message="freespace"></label>
        <meter id="freespace" min="0" max="0" value="0"> </meter>
      </div>
    </div>
    <div id="header_right">
      <a id="service_url" tabindex="-1" >
        <img id="logo" src="../../icon48.png" alt="*cloud Logo" />
        <div id="cloud_version">&nbsp;</div>
        <div id="obsolete_string" hidden data-message="obsolete_version"></div>
      </a>
    </div>
  </div>

  <div id="msg_container"> </div>

  <form id="accountForm">
    <fieldset id="disableable_fieldset">

      <p>
      <div >
        <label for="serverUrl"  data-message="serverUrl"></label>
        <div ><img src="images/Help.svg" alt="Help icon">
          <div  data-message="serverUrl_details"></div>
        </div>
      </div>
      <input id="serverUrl" type="url" pattern="https?://.*" required placeholder="https://example.com"
         value="" />
      </p>

      <p>
      <div >
        <label for="username"  data-message="username"></label>
        <div ><img src="images/Help.svg" alt="Help icon">
          <div  data-message="username_details"></div>
        </div>
      </div>
      <input id="username" type="text" required  value="" />
      </p>

      <p>
      <div >
        <label for="password"  data-message="password"></label>
        <div ><img src="images/Help.svg" alt="Help icon">
          <div  data-message="password_details"></div>
        </div>
      </div>
      <input id="password" type="password" required  value="" />
      </p>

      <details id="advanced_options">
        <summary data-message="advanced_options"></summary>
        <p>
        <div >
          <label for="storageFolder"  data-message="storageFolder"></label>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="storageFolder_details"></div>
          </div>
        </div>
        <input id="storageFolder" type="text" required  value="/Mail-attachments" />
        </p>

        <p>
        <div >
          <input id="useExpiry" type="checkbox"  />
          <span >
            <label for="useExpiry"  data-message="expiryDaysBefore"></label>
            <input type="number" id="expiryDays" min="1" step="1" value="7" disabled >
            <label  data-message="expiryDaysAfter"></label>
          </span>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="expiry_details"></div>
          </div>
        </div>
        </p>

        <p>
        <div >
          <span >
            <input id="noAutoDownload" type="checkbox"  />
            <label for="noAutoDownload"  data-message="noAutoDownload"></label>
          </span>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="noAutoDownload_details"></div>
          </div>
        </div>
        </p>

        <p>
        <div >
          <label  data-message="useDlPassword"></label>
          <input id="useDlPassword" type="checkbox" disabled hidden />
        </div>
        <div >
          <span >
            <input id="useNoDlPassword" type="radio" name="DLPRadio" checked  />
            <label for="useNoDlPassword"  data-message="useNoDlPassword"></label>
          </span>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="useNoDlPassword_details"></div>
          </div>
        </div>
        <div >
          <span >
            <input id="useGeneratedDlPassword" type="radio" name="DLPRadio"  />
            <label for="useGeneratedDlPassword"  data-message="useGeneratedDlPassword"></label>
          </span>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="useGeneratedDlPassword_details"></div>
          </div>
        </div>
        <div >
          <span >
            <input id="oneDLPassword" type="radio" name="DLPRadio"  />
            <label for="oneDLPassword"  data-message="oneDlPassword"></label>
          </span>
          <div ><img src="images/Help.svg" alt="Help icon">
            <div  data-message="useDlPassword_details"></div>
          </div>
        </div>
        <input id="downloadPassword" type="text" disabled  value="" />
        </p>
      </details>
      <p>
        <button id="saveButton"  type="submit" disabled
          data-message="saveButton"></button>
        <button id="resetButton"  type="reset" disabled data-message="resetButton"></button>
      </p>
    </fieldset>
  </form>

  <!-- Message bar templates -->
  <div id="success_popup"  hidden>
    <span > </span>
    <span ></span>
    <span ></span>
  </div>

  <div id="warning_popup"  hidden>
    <span > </span>
    <span ></span>
    <span ></span>
  </div>

  <div id="error_popup"  hidden>
    <span > </span>
    <span ></span>
    <span ></span>
  </div>
</body>

</html>
